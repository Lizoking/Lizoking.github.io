        // 按输入顺序存储的项目
        let orderedItems = [];

        // 初始化
        function init() {
            // 先从云端加载数据
            loadDataFromCloud();
            
            generateIconGrid();

                exportToPNG();
                successModal.classList.add('hidden');
            });
            
            toggleAdminPanelBtn.addEventListener('click', showAdminPasswordModal);
            cancelPasswordBtn.addEventListener('click', hideAdminPasswordModal);
            confirmPasswordBtn.addEventListener('click', verifyAdminPassword);
            customerFilterInput.addEventListener('input', filterCustomerList);
            
            cancelDeleteBtn.addEventListener('click', hideDeleteConfirmModal);
            confirmDeleteBtn.addEventListener('click', confirmDeleteCustomer);
            
            selectAllCheckbox.addEventListener('change', toggleSelectAll);
            batchDeleteBtn.addEventListener('click', showBatchDeleteConfirm);
            exportSelectedExcelBtn.addEventListener('click', exportSelectedToExcel);
            exportSelectedPdfBtn.addEventListener('click', exportSelectedToPDF);
            copyCombinedBtn.addEventListener('click', copyCombinedText);
        }

        // ===== 新增：从云端加载数据 =====
        function loadDataFromCloud() {
            collection.get().then(res => {
                // 转换云端数据格式，保持和原有逻辑兼容
                customerData = res.data.map(item => ({
                    id: item._id || item.id, // 兼容云端ID和原有ID
                    name: item.name,
                    text1: item.text1 || '',
                    text2: item.text2 || '',
                    customIcons: item.customIcons || [],
                    totalChars: item.totalChars || 0,
                    timestamp: item.timestamp || item.createTime.toISOString()
                }));
                // 更新本地列表显示
                updateCustomerList();
            }).catch(err => {
                console.error('加载云端数据失败:', err);
                // 降级使用本地存储
                customerData = JSON.parse(localStorage.getItem('customerData')) || [];
                updateCustomerList();
            });
        }

        // 生成172个图标的网格
        function generateIconGrid() {
            iconGrid.innerHTML = '';
            
            // 生成172个图标
            for (let i = 1; i <= 172; i++) {
                const iconClass = `icon-${i}`;
                const iconItem = document.createElement('div');
                iconItem.className = 'icon-item';
                iconItem.dataset.iconClass = iconClass;
                
                const iconElement = document.createElement('i');
                iconElement.className = iconClass;
                iconItem.appendChild(iconElement);
                
                iconItem.addEventListener('click', () => toggleIconSelection(iconClass));
                
                iconGrid.appendChild(iconItem);
            }
        }

        // 图标选择逻辑 - 按点击顺序添加到末尾
        function toggleIconSelection(iconClass) {
            const charCount = 3; 
            const currentTotal = calculateTotalChars();
            
            if (currentTotal + charCount <= 15) {
                // 添加到 orderedItems 末尾
                orderedItems.push({
                    type: 'custom',
                    iconClass: iconClass,
                    charCount: charCount
                });
                
                updatePreview();
                updateTotalCharCount();
            } else {
                totalCharsError.classList.remove('hidden');
                setTimeout(() => totalCharsError.classList.add('hidden'), 2000);
            }
        }

        // 处理文本输入 - 更新文字内容
        function handleTextInput(e) {
            const input = e.target;
            const value = input.value;
            const counter = input === textInput1 ? textCounter1 : textCounter2;
            const inputId = input.id;

            // 允许中英文、数字和常用标点符号
            const validPattern = /^[\u4e00-\u9fa5a-zA-Z0-9\s\.,!?;:\-_\+\=\[\]\(\)\*&^%$#@!~`'"]*$/;
            const isValid = validPattern.test(value);

            if (!isValid && value.length > 0) {
                input.classList.add('input-error');
            } else {
                input.classList.remove('input-error');
            }

            const charCount = calculateCharCount(value);
            counter.textContent = `${charCount}/15`;

            // 更新 orderedItems 中的文字
            updateTextInOrderedItems(inputId, value, charCount);
            
            // 更新总字符数显示和预览
            updateTotalCharCount();
            updatePreview();
        }

        // 更新 orderedItems 中的文字
        function updateTextInOrderedItems(inputId, value, charCount) {
            // 查找是否已存在该输入框的文字项
            const existingIndex = orderedItems.findIndex(item => item.type === 'text' && item.inputId === inputId);
            
            if (value) {
                const textItem = {
                    type: 'text',
                    content: value,
                    charCount: charCount,
                    inputId: inputId
                };
                
                if (existingIndex !== -1) {
                    // 更新已存在的文字项
                    orderedItems[existingIndex] = textItem;
                } else {
                    // 添加到末尾
                    orderedItems.push(textItem);
                }
            } else if (existingIndex !== -1) {
                // 如果文字为空，移除该文字项
                orderedItems.splice(existingIndex, 1);
            }
        }

        // 计算字符数
        function calculateCharCount(text) {
            let count = 0;
            for (let i = 0; i < text.length; i++) {
                const char = text.charAt(i);
                // 中文字符算2，其他算1
                if (/[\u4e00-\u9fa5]/.test(char)) {
                    count += 2;
                } else {
                    count += 1;
                }
            }
            return count;
        }

        // 计算总字符数
        function calculateTotalChars() {
            return orderedItems.reduce((total, item) => total + item.charCount, 0);
        }

        // 更新预览区域 - 按 orderedItems 顺序显示
        function updatePreview() {
            previewContainer.innerHTML = '';
            
            if (orderedItems.length === 0) {
                previewContainer.innerHTML = '<p class="text-gray-400 text-center">请输入文字并选择图标</p>';
                updateCombinedPreview();
                return;
            }
            
            orderedItems.forEach((item, index) => {
                const previewItem = document.createElement('div');
                previewItem.className = 'preview-item';
                previewItem.dataset.index = index;
                
                if (item.type === 'text') {
                    previewItem.innerHTML = `
                        <span>${item.content}</span>
                        <button class="ml-2 text-gray-400 hover:text-red-500" onclick="removeItem(${index})">
                            <i class="fas fa-times-circle"></i>
                        </button>
                    `;
                } else if (item.type === 'custom') {
                    previewItem.innerHTML = `
                        <i class="${item.iconClass}"></i>
                        <button class="ml-2 text-gray-400 hover:text-red-500" onclick="removeItem(${index})">
                            <i class="fas fa-times-circle"></i>
                        </button>
                    `;
                }
                
                previewContainer.appendChild(previewItem);
            });
            
            updateCombinedPreview();
        }
        
        // 更新合并预览
        function updateCombinedPreview() {
            if (orderedItems.length === 0) {
                combinedPreview.innerHTML = '<p class="text-gray-400 text-base">合并后的内容将显示在这里</p>';
                combinedChars.textContent = '0';
                return;
            }
            
            let combinedHtml = '';
            let totalChars = 0;
            
            orderedItems.forEach(item => {
                totalChars += item.charCount;
                if (item.type === 'text') {
                    combinedHtml += `<span>${item.content}</span>`;
                } else if (item.type === 'custom') {
                    combinedHtml += `<i class="${item.iconClass}"></i>`;
                }
            });
            
            combinedPreview.innerHTML = combinedHtml;
            combinedChars.textContent = totalChars;
            
            if (totalChars > 15) {
                combinedChars.classList.add('text-red-500');
            } else if (totalChars >= 12) {
                combinedChars.classList.add('text-yellow-500');
                combinedChars.classList.remove('text-red-500');
            } else {
                combinedChars.classList.remove('text-red-500', 'text-yellow-500');
            }
        }
        
        // 复制合并文本
        function copyCombinedText() {
            if (orderedItems.length === 0) return;
            
            let copyText = '';
            orderedItems.forEach(item => {
                if (item.type === 'text') {
                    copyText += item.content;
                } else {
                    copyText += '[图标]';
                }
            });
            
            navigator.clipboard.writeText(copyText).then(() => {
                const originalText = copyCombinedBtn.innerHTML;
                copyCombinedBtn.innerHTML = '<i class="fas fa-check mr-1"></i> 已复制';
                copyCombinedBtn.classList.remove('bg-gray-200', 'hover:bg-gray-300');
                copyCombinedBtn.classList.add('bg-green-100', 'hover:bg-green-200');
                
                setTimeout(() => {
                    copyCombinedBtn.innerHTML = originalText;
                    copyCombinedBtn.classList.remove('bg-green-100', 'hover:bg-green-200');
                    copyCombinedBtn.classList.add('bg-gray-200', 'hover:bg-gray-300');
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
                alert('复制失败，请重试');
            });
        }

        // 移除项目
        function removeItem(index) {
            const item = orderedItems[index];
            
            if (item.type === 'text') {
                // 如果是文字，清空对应的输入框
                if (item.inputId === 'text-input-1') {
                    textInput1.value = '';
                    textCounter1.textContent = '0/15';
                } else if (item.inputId === 'text-input-2') {
                    textInput2.value = '';
                    textCounter2.textContent = '0/15';
                }
            }
            
            orderedItems.splice(index, 1);
            updateTotalCharCount();
            updatePreview();
        }

        // 清空预览
        function clearPreview() {
            textInput1.value = '';
            textInput2.value = '';
            textCounter1.textContent = '0/15';
            textCounter2.textContent = '0/15';
            
            orderedItems = [];
            updatePreview();
            updateTotalCharCount();
            
            textError.classList.add('hidden');
            totalCharsError.classList.add('hidden');
        }

        // 更新总字符数显示
        function updateTotalCharCount() {
            const total = calculateTotalChars();
            
            totalChars.textContent = total;
            charProgress.style.width = `${(total / 15) * 100}%`;
            
            // 根据总字符数更新进度条颜色
            if (total >= 15) {
                charProgress.classList.remove('bg-primary');
                charProgress.classList.add('bg-green-500');
                if (total > 15) {
                    totalCharsError.classList.remove('hidden');
                } else {
                    totalCharsError.classList.add('hidden');
                }
            } else if (total >= 12) {
                charProgress.classList.remove('bg-primary', 'bg-green-500');
                charProgress.classList.add('bg-yellow-500');
                totalCharsError.classList.add('hidden');
            } else {
                charProgress.classList.remove('bg-yellow-500', 'bg-green-500');
                charProgress.classList.add('bg-primary');
                totalCharsError.classList.add('hidden');
            }
            
            validateForm();
        }

        // 验证表单
        function validateForm() {
            const nameValid = customerName.value.trim() !== '';
            const totalCharsValid = calculateTotalChars() > 0 && calculateTotalChars() <= 15;

            // 允许中英文、数字和常用标点符号
            const validPattern = /^[\u4e00-\u9fa5a-zA-Z0-9\s\.,!?;:\-_\+\=\[\]\(\)\*&^%$#@!~`'"]*$/;
            const text1Valid = validPattern.test(textInput1.value || '');
            const text2Valid = validPattern.test(textInput2.value || '');
            const finalTextValid = text1Valid && text2Valid;

            // 显示/隐藏文本错误提示
            if (!finalTextValid && (textInput1.value || textInput2.value)) {
                textError.classList.remove('hidden');
            } else {
                textError.classList.add('hidden');
            }

            // 显示/隐藏总字符数超限错误
            if (calculateTotalChars() > 15) {
                totalCharsError.classList.remove('hidden');
            } else {
                totalCharsError.classList.add('hidden');
            }

            // 姓名验证
            if (!nameValid) {
                customerName.classList.add('input-error');
                nameError.classList.remove('hidden');
            } else {
                customerName.classList.remove('input-error');
                nameError.classList.add('hidden');
            }

            // 按钮启用条件：姓名不为空 && 总字符数在1-15之间 && 文字内容合法
            const formValid = nameValid && totalCharsValid && finalTextValid;
            submitBtn.disabled = !formValid;
            exportPngBtn.disabled = !formValid;
            exportPdfBtn.disabled = !formValid;
        }
        
        // 提交定制（修改：同步到云端）
        function submitCustomization() {
            if (!customerName.value.trim()) {
                customerName.classList.add('input-error');
                nameError.classList.remove('hidden');
                return;
            }
            
            if (calculateTotalChars() > 15) {
                totalCharsError.classList.remove('hidden');
                alert('总字符数不能超过15！');
                return;
            }
            
            if (calculateTotalChars() === 0) {
                alert('请至少输入文字或选择图标！');
                return;
            }
            
            const text1 = textInput1.value;
            const text2 = textInput2.value;
            const customIcons = orderedItems.filter(item => item.type === 'custom').map(item => item.iconClass);
            
            const customizationData = {
                name: customerName.value.trim(),
                text1: text1,
                text2: text2,
                customIcons: customIcons,
                totalChars: calculateTotalChars(),
                createTime: new Date(), // 云端时间戳
                device: navigator.userAgent // 记录提交设备
            };
            
            // 1. 保存到云端（核心修改）
            collection.add({
                data: customizationData
            }).then(res => {
                // 2. 本地数据兼容
                const customerId = res.id || Date.now();
                customerData.push({
                    id: customerId,
                    ...customizationData,
                    timestamp: customizationData.createTime.toISOString()
                });
                
                // 3. 本地存储降级
                localStorage.setItem('customerData', JSON.stringify(customerData));
                
                // 4. 更新列表和弹窗
                updateCustomerList();
                currentCustomerId = customerId;
                successModal.classList.remove('hidden');
            }).catch(err => {
                console.error('提交到云端失败:', err);
                // 降级使用本地存储
                const customerId = Date.now();
                const localData = {
                    id: customerId,
                    name: customerName.value.trim(),
                    text1: text1,
                    text2: text2,
                    customIcons: customIcons,
                    totalChars: calculateTotalChars(),
                    timestamp: new Date().toISOString()
                };
                
                customerData.push(localData);
                localStorage.setItem('customerData', JSON.stringify(customerData));
                
                updateCustomerList();
                currentCustomerId = customerId;
                successModal.classList.remove('hidden');
                alert('云端提交失败，已保存到本地！');
            });
        }
        
        // 导出为PNG - 不带背景（优化版）
        function exportToPNG() {
            // 创建一个临时容器，只复制内容不复制背景
            const contentContainer = document.createElement('div');
            contentContainer.style.cssText = `
                font-size: 16px;
                display: flex;
                align-items: center;
                justify-content: flex-start;
                flex-wrap: wrap;
                gap: 4px;
                padding: 30px;
                background-color: transparent;
                font-family: "Noto Sans SC", "icomoon", sans-serif;
            `;
            
            // 复制合并预览的内容（不包含背景）
            contentContainer.innerHTML = combinedPreview.innerHTML;
            
            // 临时添加到 body
            contentContainer.style.position = 'absolute';
            contentContainer.style.left = '-9999px';
            contentContainer.style.top = '0';
            document.body.appendChild(contentContainer);
            
            html2canvas(contentContainer, {
                scale: 3,
                backgroundColor: null,  // 透明背景
                logging: false,
                useCORS: true, 
                allowTaint: true,
                letterRendering: true,
                imageTimeout: 15000,
                fontRendering: 'canvas'
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `powerbank-${customerName.value.trim()}-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                
                // 清理临时元素
                document.body.removeChild(contentContainer);
            }).catch(err => {
                console.error('导出PNG失败:', err);
                alert('导出PNG失败，请重试');
                // 出错也要清理
                if (document.body.contains(contentContainer)) {
                    document.body.removeChild(contentContainer);
                }
            });
        }
        
        // 导出PDF
        function exportToPDF() {
            const combinedHtml = combinedPreview.innerHTML;
            
            if (combinedHtml.includes('合并后的内容将显示在这里') || !combinedHtml.trim()) {
                alert('没有可导出的内容，请先输入定制内容');
                return;
            }

            pdfSimpleContent.innerHTML = combinedHtml;

            pdfSimpleContainer.style.display = 'block';
            pdfSimpleContainer.style.position = 'absolute';
            pdfSimpleContainer.style.left = '-9999px';
            pdfSimpleContainer.style.top = '0';

            const canvasOptions = {
                scale: 2,
                useCORS: true,
                allowTaint: true,
                backgroundColor: '#ffffff',
                logging: false,
                letterRendering: true,
                imageTimeout: 15000,
                fontRendering: 'canvas'
            };
            
            html2canvas(pdfSimpleContainer, canvasOptions).then(canvas => {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'a4',
                    compress: true
                });
                
                const imgData = canvas.toDataURL('image/png', 1.0);
                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                const yOffset = (297 - imgHeight) / 2;
                pdf.addImage(imgData, 'PNG', 0, yOffset, imgWidth, imgHeight);
                
                pdf.save(`定制内容_${customerName.value.trim()}_${Date.now()}.pdf`);
                
            }).catch(err => {
                console.error('PDF导出失败:', err);
                alert('PDF导出失败，请重试！');
            }).finally(() => {
                pdfSimpleContainer.style.display = 'none';
                pdfSimpleContainer.style.position = '';
                pdfSimpleContainer.style.left = '';
                pdfSimpleContainer.style.top = '';
            });
        }
        
        // 生成单个客户PDF并返回Blob
        function generateCustomerPDF(customer) {
            return new Promise((resolve, reject) => {
                let combinedHtml = '';
                
                if (currentCustomerId === customer.id && orderedItems.length > 0) {
                    // 当前预览的就是这个客户，直接用 orderedItems 的顺序
                    orderedItems.forEach(item => {
                        if (item.type === 'text') {
                            combinedHtml += `<span>${item.content}</span>`;
                        } else if (item.type === 'custom') {
                            combinedHtml += `<i class="${item.iconClass}"></i>`;
                        }
                    });
                } else {
                    // 如果不是当前预览的客户，按存储的顺序
                    if (customer.text1) combinedHtml += `<span>${customer.text1}</span>`;
                    
                    if (customer.customIcons && customer.customIcons.length > 0) {
                        customer.customIcons.forEach(iconClass => {
                            combinedHtml += `<i class="${iconClass}"></i>`;
                        });
                    }
                    
                    if (customer.text2) combinedHtml += `<span>${customer.text2}</span>`;
                }
                
                if (!combinedHtml.trim()) {
                    reject(new Error(`客户 ${customer.name} 没有定制内容`));
                    return;
                }

                pdfSimpleContent.innerHTML = combinedHtml;

                pdfSimpleContainer.style.display = 'block';
                pdfSimpleContainer.style.position = 'absolute';
                pdfSimpleContainer.style.left = '-9999px';
                pdfSimpleContainer.style.top = '0';

                const canvasOptions = {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#ffffff',
                    logging: false,
                    letterRendering: true,
                    imageTimeout: 15000,
                    fontRendering: 'canvas'
                };
                
                html2canvas(pdfSimpleContainer, canvasOptions).then(canvas => {
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF({
                        orientation: 'portrait',
                        unit: 'mm',
                        format: 'a4',
                        compress: true
                    });
                    
                    const imgData = canvas.toDataURL('image/png', 1.0);
                    const imgWidth = 210;
                    const imgHeight = (canvas.height * imgWidth) / canvas.width;
                    
                    const yOffset = (297 - imgHeight) / 2;
                    pdf.addImage(imgData, 'PNG', 0, yOffset, imgWidth, imgHeight);
                    
                    const pdfBlob = pdf.output('blob');
                    
                    // 查找客户的序号
                    const index = customerData.findIndex(c => c.id === customer.id) + 1;
                    const fileName = `${index}-${customer.name}.pdf`;
                    
                    resolve({
                        name: fileName,
                        blob: pdfBlob
                    });
                    
                }).catch(err => {
                    reject(err);
                }).finally(() => {
                    pdfSimpleContainer.style.display = 'none';
                    pdfSimpleContainer.style.position = '';
                    pdfSimpleContainer.style.left = '';
                    pdfSimpleContainer.style.top = '';
                });
            });
        }
        
        // 导出选中客户的PDF为ZIP压缩包
        async function exportSelectedToPDF() {
            const selectedCustomers = customerData.filter(c => selectedCustomerIds.has(c.id));
            
            if (selectedCustomers.length === 0) {
                alert('请先选择要导出的客户');
                return;
            }
            
            const originalBtnText = exportSelectedPdfBtn.innerHTML;
            exportSelectedPdfBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> 正在导出...';
            exportSelectedPdfBtn.disabled = true;
            
            try {
                const zip = new JSZip();
                const pdfPromises = selectedCustomers.map(customer => generateCustomerPDF(customer));
                const pdfFiles = await Promise.all(pdfPromises);
                
                pdfFiles.forEach(file => {
                    zip.file(file.name, file.blob);
                });
                
                const zipContent = await zip.generateAsync({
                    type: 'blob',
                    compression: 'DEFLATE',
                    compressionOptions: { level: 6 }
                });
                
                const now = new Date();
                const zipFileName = `选中定制订单_${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2, '0')}${now.getDate().toString().padStart(2, '0')}.zip`;
                saveAs(zipContent, zipFileName);
                
                alert(`成功导出 ${selectedCustomers.length} 个PDF文件，已打包为ZIP压缩包`);
                
            } catch (err) {
                console.error('ZIP导出失败:', err);
                alert('导出失败，请重试！');
            } finally {
                exportSelectedPdfBtn.innerHTML = originalBtnText;
                exportSelectedPdfBtn.disabled = false;
            }
        }

        // 导出选中客户的Excel
        function exportSelectedToExcel() {
            const selectedCustomers = customerData.filter(c => selectedCustomerIds.has(c.id));
            
            if (selectedCustomers.length === 0) {
                alert('请先选择要导出的客户');
                return;
            }

            // 创建CSV内容 - 只包含序号和姓名
            let csvContent = "\uFEFF序号,姓名\n";
            
            selectedCustomers.forEach((customer, index) => {
                const row = [
                    index + 1,
                    customer.name
                ].join(',');
                
                csvContent += row + '\n';
            });
            
            // 下载CSV文件（Excel可打开）
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `选中客户_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // 显示批量删除确认
        function showBatchDeleteConfirm() {
            if (selectedCustomerIds.size === 0) return;
            
            const customerNames = customerData
                .filter(c => selectedCustomerIds.has(c.id))
                .map(c => c.name)
                .join('、');
            
            if (confirm(`确定要删除选中的 ${selectedCustomerIds.size} 个客户吗？\n\n客户：${customerNames}\n\n此操作不可恢复！`)) {
                batchDeleteCustomers();
            }
        }

        // 批量删除客户（修改：同步删除云端数据）
        function batchDeleteCustomers() {
            // 1. 先删除云端数据
            const deletePromises = [];
            selectedCustomerIds.forEach(id => {
                deletePromises.push(collection.doc(id).remove());
            });
            
            Promise.all(deletePromises).then(() => {
                console.log('云端批量删除成功');
            }).catch(err => {
                console.error('云端批量删除失败:', err);
            }).finally(() => {
                // 2. 本地数据删除（核心逻辑保留）
                customerData = customerData.filter(customer => !selectedCustomerIds.has(customer.id));
                
                // 3. 清空选中集合
                selectedCustomerIds.clear();
                
                // 4. 更新本地存储
                localStorage.setItem('customerData', JSON.stringify(customerData));
                
                // 5. 更新客户列表
                updateCustomerList(customerFilterInput.value.trim().toLowerCase());
                
                // 6. 更新全选状态
                selectAllCheckbox.checked = false;
                
                // 7. 更新选中数量
                updateSelectedCount();
                
                alert('选中的客户已成功删除');
            });
        }

        // 切换全选
        function toggleSelectAll(e) {
            const checkboxes = document.querySelectorAll('.customer-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = e.target.checked;
                if (e.target.checked) {
                    selectedCustomerIds.add(parseInt(cb.dataset.id));
                } else {
                    selectedCustomerIds.delete(parseInt(cb.dataset.id));
                }
            });
            updateSelectedCount();
        }

        // 更新选中数量显示
        function updateSelectedCount() {
            selectedCountSpan.textContent = `已选择 ${selectedCustomerIds.size} 项`;
            batchDeleteBtn.disabled = selectedCustomerIds.size === 0;
            
            const totalCheckboxes = document.querySelectorAll('.customer-checkbox').length;
            if (selectedCustomerIds.size === totalCheckboxes && totalCheckboxes > 0) {
                selectAllCheckbox.checked = true;
            } else {
                selectAllCheckbox.checked = false;
            }
        }

        // 显示管理员密码弹窗
        function showAdminPasswordModal() {
            adminPasswordInput.value = '';
            passwordError.classList.add('hidden');
            adminPasswordModal.classList.remove('hidden');
        }
        
        // 隐藏管理员密码弹窗
        function hideAdminPasswordModal() {
            adminPasswordModal.classList.add('hidden');
        }
        
        // 验证管理员密码
        function verifyAdminPassword() {
            const password = adminPasswordInput.value.trim();
            
            if (password === ADMIN_PASSWORD) {
                hideAdminPasswordModal();
                adminPanel.classList.remove('hidden');
            } else {
                passwordError.classList.remove('hidden');
                adminPasswordInput.classList.add('input-error');
                
                setTimeout(() => {
                    passwordError.classList.add('hidden');
                    adminPasswordInput.classList.remove('input-error');
                }, 3000);
            }
        }
        
        // 筛选客户列表
        function filterCustomerList() {
            const filterText = customerFilterInput.value.trim().toLowerCase();
            updateCustomerList(filterText);
        }
        
        // 显示删除确认弹窗
        function showDeleteConfirmModal(id) {
            deleteCustomerId = id;
            deleteConfirmModal.classList.remove('hidden');
        }
        
        // 隐藏删除确认弹窗
        function hideDeleteConfirmModal() {
            deleteConfirmModal.classList.add('hidden');
            deleteCustomerId = null;
        }
        
        // 确认删除客户（修改：同步删除云端）
        function confirmDeleteCustomer() {
            if (!deleteCustomerId) return;
            
            // 1. 删除云端数据
            collection.doc(deleteCustomerId).remove().then(() => {
                console.log('云端删除成功');
            }).catch(err => {
                console.error('云端删除失败:', err);
            }).finally(() => {
                // 2. 本地数据删除
                customerData = customerData.filter(customer => customer.id !== deleteCustomerId);
                // 3. 从选中集合中删除
                selectedCustomerIds.delete(deleteCustomerId);
                
                // 4. 更新本地存储
                localStorage.setItem('customerData', JSON.stringify(customerData));
                
                // 5. 更新客户列表
                updateCustomerList(customerFilterInput.value.trim().toLowerCase());
                
                // 6. 隐藏弹窗
                hideDeleteConfirmModal();
                
                // 7. 更新选中数量
                updateSelectedCount();
                
                alert('客户记录已成功删除');
            });
        }
        
        // 更新客户列表
        function updateCustomerList(filterText = '') {
            customerList.innerHTML = '';
            
            // 筛选客户数据
            let filteredData = customerData;
            if (filterText) {
                filteredData = customerData.filter(customer => 
                    customer.name.toLowerCase().includes(filterText)
                );
            }
            
            if (filteredData.length === 0) {
                customerList.innerHTML = `
                    <tr>
                        <td colspan="5" class="py-4 px-4 text-center text-gray-500">${filterText ? '未找到匹配的客户' : '暂无客户数据'}</td>
                    </tr>
                `;
                selectAllCheckbox.disabled = true;
                batchDeleteBtn.disabled = true;
                return;
            }
            
            selectAllCheckbox.disabled = false;
            
            filteredData.forEach((customer, index) => {
                const row = document.createElement('tr');
                
                // 构建定制内容的HTML，按顺序显示文字和图标
                let contentHtml = '<div class="custom-content-cell">';
                
                // 先显示文字1
                if (customer.text1) {
                    contentHtml += `<span>${customer.text1}</span>`;
                }
                
                // 再显示所有图标（按存储顺序）
                if (customer.customIcons && customer.customIcons.length > 0) {
                    customer.customIcons.forEach(iconClass => {
                        contentHtml += `<i class="${iconClass}"></i>`;
                    });
                }
                
                // 最后显示文字2
                if (customer.text2) {
                    contentHtml += `<span>${customer.text2}</span>`;
                }
                
                contentHtml += '</div>';
                
                row.innerHTML = `
                    <td class="checkbox-column">
                        <input type="checkbox" class="customer-checkbox" data-id="${customer.id}" ${selectedCustomerIds.has(customer.id) ? 'checked' : ''}>
                    </td>
                    <td class="w-16">${index + 1}</td>
                    <td>${customer.name}</td>
                    <td>${contentHtml}</td>
                    <td class="action-column">
                        <i class="fas fa-trash delete-btn" onclick="showDeleteConfirmModal(${customer.id})" title="删除"></i>
                    </td>
                `;
                
                // 添加复选框事件
                const checkbox = row.querySelector('.customer-checkbox');
                checkbox.addEventListener('change', function(e) {
                    if (this.checked) {
                        selectedCustomerIds.add(customer.id);
                    } else {
                        selectedCustomerIds.delete(customer.id);
                    }
                    updateSelectedCount();
                });
                
                customerList.appendChild(row);
            });
            
            updateSelectedCount();
        }
        
        // 查看客户详情
        function viewCustomerDetail(id) {
            const customer = customerData.find(c => c.id === id);
            if (!customer) return;
            
            customerName.value = customer.name;
            textInput1.value = customer.text1 || '';
            textInput2.value = customer.text2 || '';
            
            orderedItems = [];
            
            if (customer.text1) {
                orderedItems.push({
                    type: 'text',
                    content: customer.text1,
                    charCount: calculateCharCount(customer.text1),
                    inputId: 'text-input-1'
                });
            }
            
            if (customer.customIcons && customer.customIcons.length > 0) {
                customer.customIcons.forEach(iconClass => {
                    orderedItems.push({
                        type: 'custom',
                        iconClass: iconClass,
                        charCount: 3
                    });
                });
            }
            
            if (customer.text2) {
                orderedItems.push({
                    type: 'text',
                    content: customer.text2,
                    charCount: calculateCharCount(customer.text2),
                    inputId: 'text-input-2'
                });
            }
            
            updatePreview();
            updateTotalCharCount();
            
            textCounter1.textContent = `${calculateCharCount(customer.text1 || '')}/15`;
            textCounter2.textContent = `${calculateCharCount(customer.text2 || '')}/15`;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // 导出客户PNG
        function exportCustomerPNG(id) {
            viewCustomerDetail(id);
            setTimeout(exportToPNG, 500);
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', init);
    </script>
